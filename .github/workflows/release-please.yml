name: Release Please

# This workflow uses release-please to automatically create semantic version tags
# and GitHub releases based on conventional commit messages.
#
# How it works:
# 1. On push to main, release-please analyzes commit messages
# 2. It creates a Release PR with version bump and changelog
# 3. When the Release PR is merged, it automatically creates:
#    - A semantic version tag (e.g., v1.2.3)
#    - A GitHub release with changelog
# 4. publish-docker runs only when a release is created and builds/pushes to Docker Hub
#
# Commit message format (Conventional Commits):
# - feat: New feature (minor version bump)
# - fix: Bug fix (patch version bump)
# - feat!: Breaking change (major version bump)
# - docs, perf, refactor, test, build, ci, chore: No version bump by default

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: simple

  publish-docker:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ needs.release-please.outputs.tag_name }}" origin/main; then
            echo "Tag is not on main branch, skipping"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
