name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            pytest \
            pytest-cov \
            pytest-mock \
            responses \
            simple_salesforce \
            prometheus_client \
            apscheduler \
            pandas \
            cffi \
            "genbadge[coverage]"

      - name: Run unit tests with coverage
        run: python -m pytest tests/ -v --cov=src/sfmon --cov-report=xml --cov-report=term-missing

      - name: Generate coverage badge
        run: |
          mkdir -p badges
          genbadge coverage -i coverage.xml -o badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
