name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            pytest \
            pytest-mock \
            responses \
            simple_salesforce \
            prometheus_client \
            apscheduler \
            pandas \
            cffi

      - name: Run unit tests
        run: python -m pytest tests/ -v
