# Refresh PMD XML and minimal permission set JSON from production metadata, then commit
# under src/sfmon/tech_debt/. The published Docker image excludes these files (.dockerignore);
# mount them at runtime or bake them into a private image (remove those .dockerignore lines).
#
# Requires repository secrets:
#   SALESFORCE_AUTH_URL — SFDX auth URL (same shape as SFMon runtime), e.g. from `sf org display --url-only`
#
# Requires in-repo:
#   manifest/package.xml — retrieve manifest (Apex + permission sets, etc.)
#   src/sfmon/tech_debt/apexruleset.xml — PMD ruleset (commit yours; starter included)
#
# GitLab equivalent: .gitlab/workflows/update-local-reports.yml (include from .gitlab-ci.yml)
#
# If the default branch is protected, allow GitHub Actions to bypass or use a PAT with
# push rights in a checkout action token (not covered here).

name: Update local reports

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Path to package.xml for sf project retrieve
        required: false
        default: manifest/package.xml
  #schedule:
    # Weekly, Monday 06:00 UTC — adjust as needed
    #- cron: "0 6 * * 1"

concurrency:
  group: update-local-reports
  cancel-in-progress: false

permissions:
  contents: write

env:
  MANIFEST_PATH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.manifest_path || 'manifest/package.xml' }}
  PMD_VERSION: "7.16.0"
  RULESET_FILE: src/sfmon/tech_debt/apexruleset.xml
  PMD_REPORT: src/sfmon/tech_debt/pmd-report.xml
  MINIMAL_PERM_REPORT: src/sfmon/tech_debt/minimal-perm-sets.json
  SF_AUTOUPDATE_DISABLE: "true"
  SF_USE_GENERIC_UNIX_KEYCHAIN: "true"
  SF_DOMAIN_RETRY: "300"
  SF_PROJECT_AUTOUPDATE_DISABLE_FOR_PACKAGE_CREATE: "true"
  SF_PROJECT_AUTOUPDATE_DISABLE_FOR_PACKAGE_VERSION_CREATE: "true"
  SF_DISABLE_DNS_CHECK: "true"
  SF_DISABLE_SOURCE_MEMBER_POLLING: "true"
  SF_HIDE_RELEASE_NOTES: "true"
  SF_HIDE_RELEASE_NOTES_FOOTER: "true"
  SF_SKIP_NEW_VERSION_CHECK: "true"
  SF_CONTAINER_MODE: "true"
  SF_CI_HEARTBEAT_FREQUENCY_MS: "60000"
  NODE_NO_WARNINGS: "1"
  PMD_JAVA_OPTS: "-Xmx1024m"
  PMD_THREADS: "1"

jobs:
  update-local-reports:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Salesforce CLI and system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv unzip curl
          npm install --global @salesforce/cli@latest
          sf version --verbose --json

      - name: Download PMD
        run: |
          curl -fL -o pmd-dist.zip "https://github.com/pmd/pmd/releases/download/pmd_releases/${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip"
          unzip -q pmd-dist.zip

      - name: Authenticate to Salesforce org
        env:
          SALESFORCE_AUTH_URL: ${{ secrets.SALESFORCE_AUTH_URL }}
        run: |
          if [ -z "${SALESFORCE_AUTH_URL}" ]; then
            echo "::error::Secret SALESFORCE_AUTH_URL is not set"
            exit 1
          fi
          echo "${SALESFORCE_AUTH_URL}" | sf org login sfdx-url --set-default --sfdx-url-stdin

      - name: Retrieve metadata
        run: |
          sf project retrieve start -x "${MANIFEST_PATH}" -w 60

      - name: Run PMD (Apex)
        run: |
          set +e
          pmd-bin-${PMD_VERSION}/bin/pmd check \
            -d force-app/main/default/classes \
            -d force-app/main/default/triggers \
            -R "${RULESET_FILE}" \
            -f xml \
            -r "${PMD_REPORT}" \
            -t "${PMD_THREADS}" \
            --no-cache \
            --no-fail-on-error \
            --no-fail-on-violation
          rc=$?
          set -e
          if [ ! -f "${PMD_REPORT}" ]; then
            echo "::error::PMD did not write ${PMD_REPORT}"
            exit 1
          fi
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 4 ]; then
            echo "::warning::PMD exited with code $rc (4 = violations found is OK)"
            exit "$rc"
          fi

      - name: Generate minimal permission sets report
        run: |
          python3 scripts/determine_minimal_perm_sets.py \
            --metadata-dir force-app/main/default/permissionsets \
            --output "${MINIMAL_PERM_REPORT}"

      - name: Commit and push updated reports
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: bash scripts/push_updated_reports.sh
